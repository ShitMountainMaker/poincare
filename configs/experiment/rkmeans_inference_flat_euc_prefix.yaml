# @package _global_
defaults:
  - rkmeans_inference_flat
  - _self_

tags:
- amazon-assign-ids-inference
- euclidean-prefix

model:
  hierarchy_regularizer:
    _target_: src.components.prefix_losses.EuclideanPrefixLoss
